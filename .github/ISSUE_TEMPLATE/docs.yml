name: Documentation Update
description: Suggest improvements or report issues in documentation
labels: ["documentation", "good first issue", "gssoc-2026"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the documentation issue or improvement
      description: A clear and concise description of what is missing or needs improvement.
    validations:
      required: true
  - type: input
    id: link
    attributes:
      label: Link to the relevant documentation page or file
      description: Provide the URL or file path where the issue or improvement is located.
