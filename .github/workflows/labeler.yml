name: GSSoC Auto Labeler

on:
  workflow_dispatch:
    inputs:
      sync_existing:
        description: "Label all existing issues and pull requests"
        required: false
        type: boolean
        default: true
  issues:
    types: [opened, reopened, edited]
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, edited, closed]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: gssoc-labeler-${{ github.event_name }}-${{ github.event.issue.number || github.event.pull_request.number || 'manual' }}
  cancel-in-progress: false

jobs:
  label:
    runs-on: ubuntu-latest

    steps:
      - name: Sync GSSoC labels
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const eventName = context.eventName;
            const payload = context.payload;

            const LABELS_TO_CREATE = {
              'gssoc:approved': {
                color: '2da44e',
                description: 'Merged and approved GSSoC contribution'
              },
              'level:beginner': {
                color: '9be9a8',
                description: 'Small, beginner-friendly contribution'
              },
              'level:intermediate': {
                color: 'fbca04',
                description: 'Moderate contribution complexity'
              },
              'level:advanced': {
                color: 'fd8c73',
                description: 'Large or advanced contribution'
              },
              'level:critical': {
                color: '8250df',
                description: 'High-impact or very complex contribution'
              },
              'type:docs': {
                color: 'd4c5f9',
                description: 'Documentation changes'
              },
              'type:bug': {
                color: 'ffccd5',
                description: 'Bug fix changes'
              },
              'type:feature': {
                color: 'd4bfff',
                description: 'New feature or enhancement'
              },
              'type:testing': {
                color: 'b6e3ff',
                description: 'Testing related changes'
              },
              'type:design': {
                color: 'ffb3c7',
                description: 'Design, UI, or UX related changes'
              },
              'type:refactor': {
                color: 'b7eb8f',
                description: 'Refactoring or cleanup work'
              },
              'type:accessibility': {
                color: 'b6e3ff',
                description: 'Accessibility improvements'
              },
              'type:performance': {
                color: 'ffd6a5',
                description: 'Performance improvements'
              },
              'type:devops': {
                color: 'ffd6a5',
                description: 'CI, deployment, or infrastructure changes'
              },
              'type:security': {
                color: 'ffadad',
                description: 'Security-related changes'
              }
            };

            // Old labels from earlier versions that should be removed if present.
            const LEGACY_LABELS = ['quality:clean', 'quality:exceptional'];

            const TYPE_ORDER = [
              'type:security',
              'type:devops',
              'type:accessibility',
              'type:performance',
              'type:testing',
              'type:docs',
              'type:design',
              'type:bug',
              'type:feature',
              'type:refactor'
            ];

            const LEVEL_ORDER = [
              'level:beginner',
              'level:intermediate',
              'level:advanced',
              'level:critical'
            ];

            async function ensureLabel(name) {
              const meta = LABELS_TO_CREATE[name];
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color: meta.color,
                  description: meta.description
                });
              }
            }

            async function ensureAllLabels() {
              for (const name of Object.keys(LABELS_TO_CREATE)) {
                await ensureLabel(name);
              }
            }

            async function listLabelsOnItem(number) {
              const labels = await github.paginate(github.rest.issues.listLabelsOnIssue, {
                owner,
                repo,
                issue_number: number,
                per_page: 100
              });
              return labels.map(label => label.name);
            }

            async function syncLabels(number, desiredLabels) {
              const desired = [...new Set(desiredLabels.filter(Boolean))];
              const current = await listLabelsOnItem(number);
              const currentSet = new Set(current);

              const managed = new Set([
                ...Object.keys(LABELS_TO_CREATE),
                ...LEGACY_LABELS
              ]);

              const toAdd = desired.filter(label => !currentSet.has(label));
              const toRemove = current.filter(label => managed.has(label) && !desired.includes(label));

              if (toAdd.length > 0) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: number,
                  labels: toAdd
                });
              }

              for (const label of toRemove) {
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: number,
                    name: label
                  });
                } catch (error) {
                  if (error.status !== 404) throw error;
                }
              }
            }

            function isExcludedAuthor(login) {
              return ['devanik21', 'Devanik21'].includes(String(login || ''));
            }

            function textBlob(item) {
              return `${item?.title || ''}\n${item?.body || ''}`.toLowerCase();
            }

            function pickFirst(candidates, order) {
              for (const label of order) {
                if (candidates.has(label)) return label;
              }
              return null;
            }

            function classifyIssue(item) {
              const blob = textBlob(item);
              const matches = new Set();

              if (/\b(security|auth|oauth|jwt|secret|vulnerability|encrypt)\b/.test(blob)) matches.add('type:security');
              if (/\b(devops|ci|cd|deploy|deployment|pipeline|docker|kubernetes|terraform)\b/.test(blob)) matches.add('type:devops');
              if (/\b(accessibility|a11y|aria|wcag)\b/.test(blob)) matches.add('type:accessibility');
              if (/\b(performance|slow|optimi[sz]e|lag|benchmark|cache)\b/.test(blob)) matches.add('type:performance');
              if (/\b(test|testing|qa)\b/.test(blob)) matches.add('type:testing');
              if (/\b(docs?|documentation|readme)\b/.test(blob)) matches.add('type:docs');
              if (/\b(design|ui|ux|layout|style|mockup)\b/.test(blob)) matches.add('type:design');
              if (/\b(bug|error|crash|fail|broken|issue|fix|hotfix|patch)\b/.test(blob)) matches.add('type:bug');
              if (/\b(feature|enhancement|request|add|implement)\b/.test(blob)) matches.add('type:feature');
              if (/\b(refactor|cleanup|restructure|simplify|rewrite|rename)\b/.test(blob)) matches.add('type:refactor');

              return pickFirst(matches, TYPE_ORDER);
            }

            function classifyPRType(files, pr) {
              const candidates = new Set();
              const filenames = files.map(file => file.filename.toLowerCase());
              const blob = textBlob(pr);

              const docs = filenames.some(name =>
                name.startsWith('docs/') ||
                name.includes('/docs/') ||
                /(^|\/)(readme|changelog|contributing|code_of_conduct|license)(\.[^/]+)?$/.test(name) ||
                /\.(md|mdx|rst|txt|adoc)$/.test(name)
              );
              if (docs || /\bdocs?\b/.test(blob) || /\bdocumentation\b/.test(blob)) candidates.add('type:docs');

              const testing = filenames.some(name =>
                name.includes('/test/') ||
                name.includes('/tests/') ||
                name.includes('/__tests__/') ||
                /(^|\/)(test|tests)\//.test(name) ||
                /\.(test|spec)\.[^.]+$/.test(name)
              );
              if (testing || /\btest(s|ing)?\b/.test(blob) || /\bqa\b/.test(blob)) candidates.add('type:testing');

              const design = filenames.some(name =>
                name.includes('/design/') ||
                name.includes('/ui/') ||
                name.includes('/ux/') ||
                name.includes('/assets/') ||
                /\.(fig|svg|png|jpe?g|gif|webp|ico)$/.test(name) ||
                /\.(css|scss|sass|less)$/.test(name)
              );
              if (design || /\bdesign\b/.test(blob) || /\bui\b/.test(blob) || /\bux\b/.test(blob)) candidates.add('type:design');

              const accessibility = filenames.some(name =>
                name.includes('accessibility') ||
                name.includes('/a11y/') ||
                /aria|wcag/.test(name)
              );
              if (accessibility || /\baccessibility\b/.test(blob) || /\ba11y\b/.test(blob) || /\baria\b/.test(blob) || /\bwcag\b/.test(blob)) candidates.add('type:accessibility');

              const performance = filenames.some(name =>
                name.includes('perf') ||
                name.includes('performance') ||
                name.includes('benchmark') ||
                name.includes('cache')
              );
              if (performance || /\bperformance\b/.test(blob) || /\boptimi[sz]e\b/.test(blob) || /\bbenchmark\b/.test(blob)) candidates.add('type:performance');

              const devops = filenames.some(name =>
                name.startsWith('.github/workflows/') ||
                name.includes('/.github/workflows/') ||
                name.includes('/docker') ||
                name.includes('dockerfile') ||
                name.includes('compose.yml') ||
                name.includes('compose.yaml') ||
                name.includes('terraform') ||
                name.includes('k8s') ||
                name.includes('kubernetes') ||
                name.includes('helm') ||
                name.includes('/ci/')
              );
              if (devops || /\b(devops|ci|cd|deploy|deployment|pipeline|docker|kubernetes|terraform)\b/.test(blob)) candidates.add('type:devops');

              const security = filenames.some(name =>
                name.includes('security') ||
                name.includes('/auth/') ||
                name.includes('oauth') ||
                name.includes('jwt') ||
                name.includes('secret') ||
                name.includes('encrypt')
              );
              if (security || /\bsecurity\b/.test(blob) || /\bauth\b/.test(blob) || /\boauth\b/.test(blob) || /\bjwt\b/.test(blob) || /\bencrypt/.test(blob)) candidates.add('type:security');

              if (/\b(bug|fix|hotfix|patch|resolve|resolved|issue)\b/.test(blob)) candidates.add('type:bug');
              if (/\b(feature|enhancement|implement|add|added|introduce|new)\b/.test(blob)) candidates.add('type:feature');
              if (/\b(refactor|cleanup|restructure|simplify|rewrite|rename)\b/.test(blob)) candidates.add('type:refactor');

              return pickFirst(candidates, TYPE_ORDER);
            }

            function classifyLevel(filesCount, additions, deletions) {
              const total = (additions || 0) + (deletions || 0);

              if (filesCount <= 3 && total <= 50) return 'level:beginner';
              if (filesCount <= 8 && total <= 250) return 'level:intermediate';
              if (filesCount <= 15 && total <= 700) return 'level:advanced';
              return 'level:critical';
            }

            async function loadPR(prNumber) {
              const [pr, files, reviews] = await Promise.all([
                github.rest.pulls.get({ owner, repo, pull_number: prNumber }),
                github.paginate(github.rest.pulls.listFiles, { owner, repo, pull_number: prNumber, per_page: 100 }),
                github.paginate(github.rest.pulls.listReviews, { owner, repo, pull_number: prNumber, per_page: 100 })
              ]);

              return {
                pr: pr.data,
                files,
                reviews
              };
            }

            async function labelIssue(item) {
              if (isExcludedAuthor(item?.user?.login)) return;
              const typeLabel = classifyIssue(item);
              await syncLabels(item.number, typeLabel ? [typeLabel] : []);
            }

            async function labelPR(prNumber) {
              const { pr, files } = await loadPR(prNumber);

              if (isExcludedAuthor(pr?.user?.login)) return;

              const typeLabel = classifyPRType(files, pr);
              const levelLabel = classifyLevel(files.length, pr.additions || 0, pr.deletions || 0);

              const desired = [];

              if (typeLabel) desired.push(typeLabel);
              if (levelLabel) desired.push(levelLabel);
              desired.push('gssoc:approved');

              await syncLabels(prNumber, desired);
            }

            await ensureAllLabels();

            if (eventName === 'workflow_dispatch') {
              const syncExisting = String(payload.inputs?.sync_existing ?? 'true').toLowerCase() !== 'false';
              if (!syncExisting) return;

              const items = await github.paginate(github.rest.issues.listForRepo, {
                owner,
                repo,
                state: 'all',
                per_page: 100
              });

              for (const item of items) {
                if (item.pull_request) {
                  await labelPR(item.number);
                } else {
                  await labelIssue(item);
                }
              }
              return;
            }

            if (eventName === 'issues') {
              if (payload.issue) await labelIssue(payload.issue);
              return;
            }

            if (eventName === 'pull_request_target' || eventName === 'pull_request_review') {
              if (payload.pull_request?.number) await labelPR(payload.pull_request.number);
              return;
            }
